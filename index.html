<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تبريدك</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
    width:100%;
    overflow-x:hidden;
    font-family:Tahoma,Arial,sans-serif;
    background:#f3f8ff;
}

.header{
    width:100%;
    background:#fff;
    border-bottom:1px solid #e5edf7;
    box-shadow:0 4px 18px rgba(0,40,100,.06);
    position:sticky;
    top:0;
    z-index:999;
}

.navbar{
    max-width:1320px;
    margin:auto;
    height:82px;
    padding:0 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    direction:ltr;
}

.logo img{width:200px;display:block}

.center-menu{
    display:flex;
    align-items:center;
    gap:22px;
    direction:rtl;
}

.item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:18px;
    font-weight:700;
    color:#334155;
    white-space:nowrap;
}

.line{
    width:1px;
    height:28px;
    background:#d7dee8;
}

.order-btn{
    background:#0B57D0;
    color:white;
    text-decoration:none;
    padding:11px 20px;
    border-radius:12px;
    font-size:18px;
    font-weight:800;
    display:flex;
    align-items:center;
    gap:8px;
    direction:rtl;
}

.arrow{
    width:28px;
    height:28px;
    background:white;
    color:#0B57D0;
    border-radius:50%;
    display:grid;
    place-items:center;
}

.hero-image{
    background:linear-gradient(180deg,#eaf5ff,#f8fbff);
}

.hero-image img{
    width:100%;
    height:auto;
    display:block;
}

.order-section{
    padding:55px 16px;
    background:linear-gradient(180deg,#eef7ff,#ffffff);
    direction:rtl;
}

.order-container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:24px;
    padding:32px;
    border:1px solid #dbeafe;
    box-shadow:0 22px 55px rgba(11,87,208,.12);
}

.order-head{
    text-align:center;
    margin-bottom:24px;
}

.order-badge{
    display:inline-block;
    background:#eaf4ff;
    color:#0B57D0;
    padding:7px 16px;
    border-radius:30px;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
}

.order-head h2{
    font-size:28px;
    color:#073b82;
    margin-bottom:6px;
}

.order-head p{
    font-size:15px;
    color:#64748b;
}

.order-form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.form-group.full{grid-column:1 / 3}

.form-group label{
    font-size:14px;
    font-weight:800;
    color:#143763;
}

.form-group label span{color:#ef4444}

.form-group input,
.form-group textarea{
    width:100%;
    border:1px solid #d7e5f6;
    background:#f9fcff;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    font-family:Tahoma,Arial,sans-serif;
    outline:none;
}

.form-group input{height:46px}

.form-group textarea{
    height:82px;
    resize:none;
}

.form-group input:focus,
.form-group textarea:focus{
    background:#fff;
    border-color:#0B57D0;
    box-shadow:0 0 0 3px rgba(11,87,208,.09);
}

.submit-btn{
    grid-column:1 / 3;
    height:52px;
    border:none;
    border-radius:13px;
    background:linear-gradient(135deg,#43b51b,#2f9512);
    color:#fff;
    font-size:20px;
    font-weight:900;
    font-family:Tahoma,Arial,sans-serif;
    cursor:pointer;
    box-shadow:0 12px 26px rgba(47,149,18,.22);
}

.form-trust{
    margin-top:16px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.form-trust div{
    background:#f2f8ff;
    border:1px solid #dbeafe;
    color:#073b82;
    border-radius:12px;
    padding:11px;
    text-align:center;
    font-weight:800;
    font-size:14px;
}

.footer-banner{
    background:#073b82;
    padding:0 16px 26px;
}

.footer-inner{
    max-width:1200px;
    margin:auto;
    background:linear-gradient(135deg,#084ba5,#0B57D0);
    border-radius:28px 28px 0 0;
    padding:28px 42px;
    display:grid;
    grid-template-columns:220px 1fr 280px;
    align-items:center;
    gap:25px;
    color:#fff;
    box-shadow:0 -12px 35px rgba(11,87,208,.18);
}

.footer-logo img{
    width:160px;
    display:block;
}

.footer-text{text-align:center}

.footer-text h3{
    font-size:28px;
    margin-bottom:6px;
    font-weight:900;
}

.footer-text p{
    font-size:17px;
    color:#dbeafe;
}

.footer-info{
    text-align:right;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.footer-info strong{font-size:18px}

.footer-info span{
    font-size:15px;
    color:#dbeafe;
}

@media(max-width:900px){
    .navbar{
        height:74px;
        padding:0 18px;
    }

    .logo img{width:160px}

    .center-menu{gap:14px}

    .item{font-size:14px}

    .order-btn{
        font-size:16px;
        padding:9px 15px;
    }
}

@media(max-width:768px){

    .navbar{
        height:62px;
        padding:0 12px;
    }

    .logo img{width:122px}

    .center-menu{display:none}

    .order-btn{
        font-size:13px;
        padding:7px 11px;
        border-radius:9px;
    }

    .arrow{
        width:22px;
        height:22px;
        font-size:13px;
    }

    .hero-image img{
        width:100%;
        height:auto;
        max-height:230px;
        object-fit:contain;
        object-position:center;
    }

    .order-section{
        padding:26px 10px 34px;
    }

    .order-container{
        padding:17px 12px;
        border-radius:18px;
        box-shadow:0 12px 28px rgba(11,87,208,.10);
    }

    .order-head{
        margin-bottom:16px;
    }

    .order-badge{
        font-size:11px;
        padding:5px 12px;
        margin-bottom:8px;
    }

    .order-head h2{
        font-size:20px;
        margin-bottom:5px;
    }

    .order-head p{
        font-size:12px;
        line-height:1.6;
    }

    .order-form{
        grid-template-columns:1fr;
        gap:10px;
    }

    .form-group.full,
    .submit-btn{
        grid-column:1;
    }

    .form-group{
        gap:4px;
    }

    .form-group label{
        font-size:12px;
    }

    .form-group input{
        height:40px;
    }

    .form-group input,
    .form-group textarea{
        font-size:12px;
        border-radius:10px;
        padding:9px 11px;
    }

    .form-group textarea{
        height:60px;
    }

    .submit-btn{
        height:44px;
        font-size:16px;
        border-radius:11px;
        margin-top:2px;
    }

    .form-trust{
        grid-template-columns:1fr;
        gap:7px;
        margin-top:12px;
    }

    .form-trust div{
        font-size:12px;
        padding:9px;
        border-radius:10px;
    }

    .footer-banner{
        padding:0 10px 18px;
    }

    .footer-inner{
        grid-template-columns:1fr;
        text-align:center;
        padding:22px 14px;
        border-radius:22px 22px 0 0;
        gap:12px;
    }

    .footer-logo img{
        width:120px;
        margin:auto;
    }

    .footer-info{
        text-align:center;
    }

    .footer-text h3{
        font-size:20px;
    }

    .footer-text p,
    .footer-info span{
        font-size:13px;
    }

    .footer-info strong{
        font-size:14px;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="navbar">
        <div class="logo">
            <img src="logo.png" alt="تبريدك">
        </div>

        <div class="center-menu">
            <div class="item"><span>❄️</span><span>تبريد صيفاً</span></div>
            <div class="line"></div>
            <div class="item"><span>☀️</span><span>تدفئة شتاءً</span></div>
        </div>

        <a href="#order" class="order-btn">
            <span class="arrow">←</span>
            اطلب الآن
        </a>
    </div>
</header>

<section class="hero-image">
    <img src="secound.png" alt="تبريدك">
</section>

<section class="order-section" id="order">
    <div class="order-container">

        <div class="order-head">
            <span class="order-badge">طلب سريع وآمن</span>
            <h2>اطلب جهاز تبريدك الآن</h2>
            <p>عبّي بياناتك وسيتم التواصل معك لتأكيد الطلب والتركيب</p>
        </div>

        <form action="send_order.php" method="POST" class="order-form">
            <div class="form-group">
                <label>الاسم الكامل <span>*</span></label>
                <input type="text" name="full_name" placeholder="اكتب اسمك الكامل" required>
            </div>

            <div class="form-group">
                <label>رقم الجوال <span>*</span></label>
                <input type="tel" name="phone" placeholder="05xxxxxxxx" required>
            </div>

            <div class="form-group">
                <label>المدينة <span>*</span></label>
                <input type="text" name="city" placeholder="اكتب اسم المدينة" required>
            </div>

            <div class="form-group">
                <label>العنوان <span>*</span></label>
                <input type="text" name="address" placeholder="اكتب العنوان بالتفصيل" required>
            </div>

            <div class="form-group full">
                <label>ملاحظات إضافية</label>
                <textarea name="notes" placeholder="اكتب أي ملاحظات إضافية"></textarea>
            </div>

            <button type="submit" class="submit-btn">إرسال الطلب الآن</button>
        </form>

        <div class="form-trust">
            <div>🛡️ ضمان 24 شهر</div>
            <div>✅ جودة موثوقة</div>
            <div>🎧 متابعة بعد التركيب</div>
        </div>

    </div>
</section>

<section class="footer-banner">
    <div class="footer-inner">

        <div class="footer-logo">
            <img src="last.png" alt="تبريدك">
        </div>

        <div class="footer-text">
            <h3>تبريدك.. خيارك الذكي</h3>
            <p>لراحة تدوم صيفاً وشتاءً</p>
        </div>

        <div class="footer-info">
            <strong>جهاز تبريد وتسخين المياه</strong>
            <span>راحة استخدامك بأداء عالي وموثوق</span>
        </div>

    </div>
</section>

</body>
</html>
