<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تبريدك</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    overflow-x:hidden;
    font-family:Tahoma,Arial,sans-serif;
    background:#f3f8ff;
}

/* Header */
.header{
    width:100%;
    background:#fff;
    border-bottom:1px solid #e5edf7;
    box-shadow:0 4px 18px rgba(0,40,100,.06);
    position:sticky;
    top:0;
    z-index:999;
}

.navbar{
    max-width:1320px;
    margin:auto;
    height:82px;
    padding:0 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    direction:ltr;
}

.logo img{
    width:200px;
    display:block;
}

.center-menu{
    display:flex;
    align-items:center;
    gap:22px;
    direction:rtl;
}

.item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:18px;
    font-weight:700;
    color:#334155;
    white-space:nowrap;
}

.line{
    width:1px;
    height:28px;
    background:#d7dee8;
}

.order-btn{
    background:#0B57D0;
    color:white;
    text-decoration:none;
    padding:11px 20px;
    border-radius:12px;
    font-size:18px;
    font-weight:800;
    display:flex;
    align-items:center;
    gap:8px;
    direction:rtl;
}

.arrow{
    width:28px;
    height:28px;
    background:white;
    color:#0B57D0;
    border-radius:50%;
    display:grid;
    place-items:center;
}

/* Hero */
.hero-image{
    background:linear-gradient(180deg,#eaf5ff,#f8fbff);
    padding:0;
}

.hero-image img{
    width:100%;
    height:auto;
    display:block;
}

/* Form */
.order-section{
    padding:60px 16px 75px;
    background:linear-gradient(135deg,#edf6ff,#ffffff);
}

.order-container{
    max-width:980px;
    margin:auto;
    background:white;
    border:1px solid #dbeafe;
    border-radius:28px;
    padding:36px;
    box-shadow:0 20px 55px rgba(11,87,208,.13);
}

.order-title{
    text-align:center;
    margin-bottom:30px;
}

.order-title h2{
    color:#073b82;
    font-size:32px;
    margin-bottom:8px;
}

.order-title p{
    color:#64748b;
    font-size:16px;
}

.order-form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px 22px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.form-group.full{
    grid-column:1 / 3;
}

label{
    color:#143763;
    font-size:15px;
    font-weight:800;
}

label span{
    color:#ef4444;
}

input,textarea{
    width:100%;
    border:1px solid #d5e3f5;
    background:#f8fbff;
    border-radius:13px;
    padding:14px 16px;
    font-size:15px;
    font-family:Tahoma,Arial,sans-serif;
    outline:none;
}

input{
    height:52px;
}

textarea{
    height:100px;
    resize:none;
}

input:focus,textarea:focus{
    border-color:#0B57D0;
    background:#fff;
    box-shadow:0 0 0 4px rgba(11,87,208,.09);
}

.submit-btn{
    grid-column:1 / 3;
    height:58px;
    border:0;
    border-radius:15px;
    background:linear-gradient(135deg,#41b51b,#2d9410);
    color:#fff;
    font-size:22px;
    font-weight:900;
    font-family:Tahoma,Arial,sans-serif;
    cursor:pointer;
}

.benefits{
    margin-top:24px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.benefit{
    background:#f1f7ff;
    border:1px solid #dbeafe;
    color:#073b82;
    border-radius:14px;
    padding:14px 8px;
    text-align:center;
    font-weight:800;
    font-size:15px;
}

/* Footer */
.footer-banner{
    background:linear-gradient(90deg,#073b82,#0B57D0);
    color:white;
    display:grid;
    grid-template-columns:260px 1fr 220px;
    align-items:center;
    gap:20px;
    padding:20px 55px;
}

.footer-right{
    text-align:right;
}

.footer-right h4{
    font-size:18px;
    margin-bottom:5px;
}

.footer-right p,
.footer-center p{
    color:#dbeafe;
    font-size:15px;
}

.footer-center{
    text-align:center;
}

.footer-center h3{
    font-size:25px;
    margin-bottom:5px;
}

.footer-logo img{
    width:155px;
    display:block;
}

/* Laptop */
@media(max-width:1200px){
    .logo img{
        width:175px;
    }

    .navbar{
        height:76px;
    }

    .item{
        font-size:16px;
    }
}

/* iPad */
@media(max-width:900px){
    .navbar{
        padding:0 18px;
    }

    .logo img{
        width:155px;
    }

    .center-menu{
        gap:14px;
    }

    .item{
        font-size:14px;
    }

    .order-btn{
        font-size:16px;
        padding:10px 16px;
    }

    .order-container{
        max-width:94%;
    }

    .footer-banner{
        grid-template-columns:210px 1fr 170px;
        padding:20px 25px;
    }
}

/* Phone */
@media(max-width:768px){

    .navbar{
        height:64px;
        padding:0 12px;
    }

    .logo img{
        width:125px;
    }

    .center-menu{
        display:none;
    }

    .order-btn{
        font-size:14px;
        padding:8px 12px;
        border-radius:10px;
    }

    .arrow{
        width:23px;
        height:23px;
        font-size:14px;
    }

    .hero-image{
        background:#eaf5ff;
    }

    .hero-image img{
        width:100%;
        height:auto;
        max-height:240px;
        object-fit:contain;
        object-position:center;
    }

    .order-section{
        padding:34px 10px 50px;
    }

    .order-container{
        max-width:100%;
        padding:22px 14px;
        border-radius:20px;
    }

    .order-title{
        margin-bottom:22px;
    }

    .order-title h2{
        font-size:23px;
    }

    .order-title p{
        font-size:13px;
        line-height:1.8;
    }

    .order-form{
        grid-template-columns:1fr;
        gap:15px;
    }

    .form-group.full,
    .submit-btn{
        grid-column:1;
    }

    label{
        font-size:14px;
    }

    input{
        height:48px;
    }

    input,textarea{
        font-size:14px;
        border-radius:11px;
        padding:12px 13px;
    }

    textarea{
        height:85px;
    }

    .submit-btn{
        height:52px;
        font-size:19px;
        border-radius:12px;
    }

    .benefits{
        grid-template-columns:1fr;
        gap:9px;
        margin-top:18px;
    }

    .benefit{
        font-size:14px;
        padding:12px;
    }

    .footer-banner{
        display:flex;
        flex-direction:column;
        text-align:center;
        gap:10px;
        padding:22px 12px;
    }

    .footer-right{
        text-align:center;
    }

    .footer-logo img{
        width:125px;
        margin:auto;
    }

    .footer-center h3{
        font-size:20px;
    }

    .footer-right h4{
        font-size:15px;
    }

    .footer-right p,
    .footer-center p{
        font-size:13px;
    }
}

/* Small Phone */
@media(max-width:380px){
    .logo img{
        width:112px;
    }

    .order-btn{
        font-size:13px;
        padding:7px 10px;
    }

    .hero-image img{
        max-height:210px;
    }

    .order-title h2{
        font-size:21px;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="navbar">

        <div class="logo">
            <img src="logo.png" alt="تبريدك">
        </div>

        <div class="center-menu">
            <div class="item">
                <span>❄️</span>
                <span>تبريد صيفاً</span>
            </div>

            <div class="line"></div>

            <div class="item">
                <span>☀️</span>
                <span>تدفئة شتاءً</span>
            </div>
        </div>

        <a href="#order" class="order-btn">
            <span class="arrow">←</span>
            اطلب الآن
        </a>

    </div>
</header>

<section class="hero-image">
    <img src="secound.png" alt="تبريدك">
</section>

<section class="order-section" id="order">
    <div class="order-container">

        <div class="order-title">
            <h2>اطلب جهاز تبريدك الآن</h2>
            <p>اترك بياناتك وسيتم التواصل معك لتأكيد الطلب والتركيب</p>
        </div>

        <form action="send_order.php" method="POST" class="order-form">

            <div class="form-group">
                <label>الاسم الكامل <span>*</span></label>
                <input type="text" name="full_name" placeholder="اكتب اسمك الكامل" required>
            </div>

            <div class="form-group">
                <label>رقم الجوال <span>*</span></label>
                <input type="tel" name="phone" placeholder="05xxxxxxxx" required>
            </div>

            <div class="form-group">
                <label>المدينة <span>*</span></label>
                <input type="text" name="city" placeholder="اكتب اسم المدينة" required>
            </div>

            <div class="form-group">
                <label>العنوان <span>*</span></label>
                <input type="text" name="address" placeholder="اكتب العنوان بالتفصيل" required>
            </div>

            <div class="form-group full">
                <label>ملاحظات إضافية</label>
                <textarea name="notes" placeholder="اكتب أي ملاحظات إضافية"></textarea>
            </div>

            <button type="submit" class="submit-btn">إرسال الطلب</button>

        </form>

        <div class="benefits">
            <div class="benefit">🛡️ ضمان 24 شهر</div>
            <div class="benefit">✅ جودة عالية</div>
            <div class="benefit">🎧 متابعة بعد التركيب</div>
        </div>

    </div>
</section>

<section class="footer-banner">

    <div class="footer-right">
        <h4>جهاز تبريد وتسخين المياه</h4>
        <p>راحة استخدامك... صيفاً وشتاءً</p>
    </div>

    <div class="footer-center">
        <h3>تبريدك.. خيارك الذكي</h3>
        <p>لراحة تدوم</p>
    </div>

    <div class="footer-logo">
        <img src="last.png" alt="تبريدك">
    </div>

</section>

</body>
</html>
