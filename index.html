<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تبريدك</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    overflow-x:hidden;
}

body{
    font-family:Tahoma,Arial,sans-serif;
    background:#fff;
}

/* Header */
.header{
    width:100%;
    background:#fff;
    border-bottom:1px solid #eceff3;
    box-shadow:0 2px 12px rgba(0,0,0,.04);
    position:sticky;
    top:0;
    z-index:999;
}

.navbar{
    width:100%;
    max-width:1400px;
    margin:auto;
    min-height:86px;
    padding:0 35px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    direction:ltr;
}

.logo img{
    width:220px;
    display:block;
}

.center-menu{
    display:flex;
    align-items:center;
    gap:25px;
    direction:rtl;
}

.item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:19px;
    font-weight:700;
    color:#374151;
    white-space:nowrap;
}

.icon{
    font-size:22px;
}

.line{
    width:1px;
    height:28px;
    background:#d1d5db;
}

.order-btn{
    background:#0B57D0;
    color:#fff;
    text-decoration:none;
    padding:12px 22px;
    border-radius:12px;
    font-size:20px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    direction:rtl;
    white-space:nowrap;
}

.arrow{
    width:30px;
    height:30px;
    background:#fff;
    color:#0B57D0;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:bold;
}

/* Hero */
.hero-image{
    width:100%;
    background:#eaf5ff;
}

.hero-image img{
    width:100%;
    height:auto;
    display:block;
}

/* Order */
.order-section{
    padding:70px 18px 90px;
    background:
        radial-gradient(circle at top right, rgba(11,87,208,.15), transparent 35%),
        linear-gradient(135deg,#f2f8ff,#ffffff);
    direction:rtl;
}

.order-container{
    width:100%;
    max-width:1050px;
    margin:auto;
    background:#fff;
    border:1px solid #dbeafe;
    border-radius:30px;
    padding:42px;
    box-shadow:0 25px 70px rgba(11,87,208,.14);
}

.order-title{
    text-align:center;
    margin-bottom:34px;
}

.order-title h2{
    font-size:34px;
    color:#073b82;
    margin-bottom:10px;
}

.order-title p{
    font-size:17px;
    color:#64748b;
}

.order-form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px 24px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:9px;
}

.form-group.full{
    grid-column:1 / 3;
}

.form-group label{
    font-size:16px;
    font-weight:700;
    color:#143763;
}

.form-group label span{
    color:#ef4444;
}

.form-group input,
.form-group textarea{
    width:100%;
    border:1px solid #d5e3f5;
    background:#f8fbff;
    border-radius:14px;
    padding:15px 17px;
    font-size:16px;
    font-family:Tahoma,Arial,sans-serif;
    outline:none;
}

.form-group input{
    height:55px;
}

.form-group textarea{
    min-height:105px;
    resize:none;
}

.form-group input:focus,
.form-group textarea:focus{
    border-color:#0B57D0;
    background:#fff;
    box-shadow:0 0 0 4px rgba(11,87,208,.09);
}

.submit-btn{
    grid-column:1 / 3;
    height:62px;
    border:0;
    border-radius:16px;
    background:linear-gradient(135deg,#46b51b,#2f9411);
    color:#fff;
    font-size:24px;
    font-weight:800;
    font-family:Tahoma,Arial,sans-serif;
    cursor:pointer;
    box-shadow:0 15px 30px rgba(47,148,17,.22);
}

.benefits{
    margin-top:28px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

.benefit{
    background:#f1f7ff;
    border:1px solid #dbeafe;
    color:#073b82;
    border-radius:16px;
    padding:16px 10px;
    text-align:center;
    font-weight:700;
}

/* Footer */
.footer-banner{
    width:100%;
    background:linear-gradient(90deg,#073b82,#0B57D0);
    direction:rtl;
    display:grid;
    grid-template-columns:260px 1fr 220px;
    align-items:center;
    gap:20px;
    padding:22px 60px;
    color:#fff;
}

.footer-logo img{
    width:170px;
    display:block;
}

.footer-center{
    text-align:center;
}

.footer-center h3{
    font-size:28px;
    font-weight:800;
    margin-bottom:4px;
}

.footer-center p{
    font-size:18px;
    color:#dbeafe;
}

.footer-right{
    text-align:right;
}

.footer-right h4{
    font-size:20px;
    margin-bottom:5px;
    font-weight:700;
}

.footer-right p{
    font-size:16px;
    color:#dbeafe;
}

/* Laptop */
@media(max-width:1200px){
    .navbar{
        padding:0 24px;
    }

    .logo img{
        width:185px;
    }

    .item{
        font-size:17px;
    }

    .order-btn{
        font-size:18px;
        padding:11px 18px;
    }
}

/* iPad */
@media(max-width:900px){
    .navbar{
        min-height:76px;
    }

    .center-menu{
        gap:14px;
    }

    .item{
        font-size:15px;
    }

    .line{
        height:24px;
    }

    .order-container{
        max-width:92%;
    }

    .footer-banner{
        grid-template-columns:220px 1fr 180px;
        padding:20px 30px;
    }
}

/* Phone */
@media(max-width:768px){

    .navbar{
        min-height:64px;
        padding:10px 14px;
        flex-wrap:nowrap;
        gap:8px;
    }

    .logo{
        flex:1;
    }

    .logo img{
        width:125px;
    }

    .center-menu{
        display:none;
    }

    .order-btn{
        font-size:14px;
        padding:8px 12px;
        border-radius:10px;
        gap:6px;
    }

    .arrow{
        width:24px;
        height:24px;
        font-size:14px;
    }

    .hero-image{
        height:300px;
        overflow:hidden;
    }

    .hero-image img{
        height:100%;
        width:100%;
        object-fit:cover;
        object-position:center top;
    }

    .order-section{
        padding:35px 12px 55px;
    }

    .order-container{
        max-width:100%;
        border-radius:20px;
        padding:24px 14px;
    }

    .order-title{
        margin-bottom:24px;
    }

    .order-title h2{
        font-size:24px;
        line-height:1.4;
    }

    .order-title p{
        font-size:14px;
        line-height:1.8;
    }

    .order-form{
        display:flex;
        flex-direction:column;
        gap:16px;
    }

    .form-group.full,
    .submit-btn{
        grid-column:auto;
    }

    .form-group label{
        font-size:14px;
    }

    .form-group input{
        height:50px;
    }

    .form-group input,
    .form-group textarea{
        font-size:14px;
        border-radius:12px;
        padding:13px 14px;
    }

    .form-group textarea{
        min-height:90px;
    }

    .submit-btn{
        width:100%;
        height:54px;
        font-size:20px;
        border-radius:13px;
    }

    .benefits{
        grid-template-columns:1fr;
        gap:10px;
        margin-top:20px;
    }

    .benefit{
        padding:13px;
        font-size:14px;
    }

    .footer-banner{
        display:flex;
        flex-direction:column;
        text-align:center;
        gap:12px;
        padding:22px 12px;
    }

    .footer-right{
        text-align:center;
    }

    .footer-logo img{
        width:125px;
        margin:auto;
    }

    .footer-center h3{
        font-size:20px;
    }

    .footer-center p,
    .footer-right p{
        font-size:14px;
    }

    .footer-right h4{
        font-size:15px;
    }
}

/* Small phone */
@media(max-width:380px){
    .logo img{
        width:110px;
    }

    .order-btn{
        font-size:13px;
        padding:7px 10px;
    }

    .hero-image{
        height:260px;
    }

    .order-title h2{
        font-size:22px;
    }
}
</style>
</head>

<body>

<header class="header">
    <div class="navbar">

        <div class="logo">
            <img src="logo.png" alt="تبريدك">
        </div>

        <div class="center-menu">
            <div class="item">
                <span class="icon">❄️</span>
                <span>تبريد صيفاً</span>
            </div>

            <div class="line"></div>

            <div class="item">
                <span class="icon">☀️</span>
                <span>تدفئة شتاءً</span>
            </div>
        </div>

        <a href="#order" class="order-btn">
            <span class="arrow">←</span>
            اطلب الآن
        </a>

    </div>
</header>

<section class="hero-image">
    <img src="secound.png" alt="تبريدك">
</section>

<section class="order-section" id="order">
    <div class="order-container">

        <div class="order-title">
            <h2>اطلب جهاز تبريدك الآن</h2>
            <p>اترك بياناتك وسيتم التواصل معك لتأكيد الطلب والتركيب</p>
        </div>

        <form action="send_order.php" method="POST" class="order-form">

            <div class="form-group">
                <label>الاسم الكامل <span>*</span></label>
                <input type="text" name="full_name" placeholder="اكتب اسمك الكامل" required>
            </div>

            <div class="form-group">
                <label>رقم الجوال <span>*</span></label>
                <input type="tel" name="phone" placeholder="05xxxxxxxx" required>
            </div>

            <div class="form-group">
                <label>المدينة <span>*</span></label>
                <input type="text" name="city" placeholder="اكتب اسم المدينة" required>
            </div>

            <div class="form-group">
                <label>العنوان <span>*</span></label>
                <input type="text" name="address" placeholder="اكتب العنوان بالتفصيل" required>
            </div>

            <div class="form-group full">
                <label>ملاحظات إضافية</label>
                <textarea name="notes" placeholder="اكتب أي ملاحظات إضافية"></textarea>
            </div>

            <button type="submit" class="submit-btn">إرسال الطلب</button>

        </form>

        <div class="benefits">
            <div class="benefit">🛡️ ضمان 24 شهر</div>
            <div class="benefit">✅ جودة عالية</div>
            <div class="benefit">🎧 متابعة بعد التركيب</div>
        </div>

    </div>
</section>

<section class="footer-banner">

    <div class="footer-right">
        <h4>جهاز تبريد وتسخين المياه</h4>
        <p>راحة استخدامك... صيفاً وشتاءً</p>
    </div>

    <div class="footer-center">
        <h3>تبريدك.. خيارك الذكي</h3>
        <p>لراحة تدوم</p>
    </div>

    <div class="footer-logo">
        <img src="last.png" alt="تبريدك">
    </div>

</section>

</body>
</html>
